# ═══════════════════════════════════════════════════════════════
#  PredictIQ — Docker Compose for Local Development
#  Services: PostgreSQL · Spring Boot Backend · Python ML Service
#
#  Usage:
#    docker-compose up -d            # Start all services
#    docker-compose logs -f backend  # Tail backend logs
#    docker-compose down             # Stop and remove containers
# ═══════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: predictiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       predictive_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d predictive_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: predictiq-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/predictive_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ML_SERVICE_URL:             http://ml-service:8000
      GROQ_API_KEY:               ${GROQ_API_KEY:-your_groq_api_key_here}
      GROQ_API_URL:               https://api.groq.com/openai/v1/chat/completions
      GROQ_MODEL:                 llama-3.3-70b-versatile
      JWT_SECRET:                 ${JWT_SECRET:-predictiq-super-secret-256-bit-key-change-in-prod}
      JWT_EXPIRATION:             86400000
    ports:
      - "8080:8080"
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8080/api/dashboard/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ─── Python ML Microservice ─────────────────────────────────
  ml-service:
    build:
      context:    ./ml-service
      dockerfile: Dockerfile
    container_name: predictiq-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/saved_models
    environment:
      LOG_LEVEL: INFO
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s  # Allow time for TF model loading

# ─── Named Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  ml_models:
    driver: local
