# ═══════════════════════════════════════════════════════
#  PredictIQ — Spring Boot Application Configuration
# ═══════════════════════════════════════════════════════

# ─── Server ───
server.port=8080
server.error.include-message=always

# ─── PostgreSQL Datasource ───
spring.datasource.url=jdbc:postgresql://localhost:5432/predictive_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── JWT Configuration ───
jwt.secret=predictiq-super-secret-256-bit-key-for-production-change-me
jwt.expiration=86400000

# ─── ML Microservice ───
ml.service.url=http://localhost:8000

# ─── Groq API ───
groq.api.key=your_groq_api_key_here
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ─── Logging ───
logging.level.com.predictive=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
