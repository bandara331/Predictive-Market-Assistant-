# ═══════════════════════════════════════════════════════
#  PredictIQ — LOCAL profile (H2 in-memory, no PostgreSQL needed)
#  Activate with: --spring.profiles.active=local
#  Usage: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ═══════════════════════════════════════════════════════

# ─── H2 In-Memory Database ───
spring.datasource.url=jdbc:h2:mem:predictive_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate (H2) ───
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── H2 Web Console (for debugging at http://localhost:8081/h2-console) ───
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Override server port to avoid conflicts ───
server.port=8081

# ─── JWT (local dev secret — change in production) ───
jwt.secret=local-dev-secret-key-minimum-256-bits-for-hmac-sha256
jwt.expiration=86400000

# ─── ML Service (set to localhost; falls back to synthetic data if offline) ───
ml.service.url=http://localhost:8000

# ─── Groq AI (set your real key or leave blank; falls back to demo responses) ───
groq.api.key=your_groq_api_key_here
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ─── Logging (more verbose locally) ───
logging.level.com.predictive=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
